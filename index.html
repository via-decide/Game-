<!doctype html>
<html lang="en" style="background:#050505;color:#F8F9FA;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Data Orchard — Grow. Research. Dominate.</title>
    <meta name="description" content="A genetic cultivation strategy game. Grow rare plant specimens, research traits, trade credits, and climb the global leaderboard." />
    <style>
      /* Critical: dark background shown instantly before any JS/CSS loads */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        background: #050505;
        background-image:
          radial-gradient(circle at 50% 0%, rgba(74,222,128,0.05) 0%, transparent 50%),
          radial-gradient(circle at 0% 100%, rgba(56,189,248,0.05) 0%, transparent 50%);
        color: #F8F9FA;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      /* Pre-React loading spinner — hidden once React mounts */
      #root:empty::after {
        content: '';
        display: block;
        position: fixed;
        inset: 0;
        background: #050505;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #050505;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #initial-loader.hidden { opacity: 0; pointer-events: none; }
      #initial-loader svg {
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Shown instantly; hidden once React renders -->
    <div id="initial-loader" aria-hidden="true">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="16" stroke="#1E293B" stroke-width="3"/>
        <path d="M20 4a16 16 0 0 1 16 16" stroke="#4ADE80" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </div>
    <div id="root"></div>
    <script>
      // Hide loader once React has mounted something into #root
      const observer = new MutationObserver(() => {
        if (document.getElementById('root').childElementCount > 0) {
          const loader = document.getElementById('initial-loader');
          if (loader) { loader.classList.add('hidden'); setTimeout(() => loader.remove(), 400); }
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
